<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>bài 1.2</title>
<link rel="stylesheet" href="style2.css">
</head>

<body>

<h2>Quản lý điểm sinh viên</h2>

<input id="nameInput" type="text" placeholder="Họ tên">
<input id="scoreInput" type="number" placeholder="Điểm (0-10)">
<button id="addBtn">Thêm</button>

<br><br>

<input id="searchInput" type="text" placeholder="Tìm kiếm sinh viên">

<select id="rankFilter">
<option value="all">Tất cả</option>
<option value="Giỏi">Giỏi</option>
<option value="Khá">Khá</option>
<option value="Trung bình">Trung bình</option>
<option value="Yếu">Yếu</option>
</select>

<table>

<thead>
<tr>
<th>STT</th>
<th>Họ tên</th>
<th id="scoreHeader">Điểm <span id="arrow"></span></th>
<th>Xếp loại</th>
<th>Thao tác</th>
</tr>
</thead>

<tbody id="tableBody"></tbody>

</table>

<div id="stats">
Tổng SV: 0 | Điểm TB: 0
</div>

<script src="script2.js"></script>

</body>
</html>
