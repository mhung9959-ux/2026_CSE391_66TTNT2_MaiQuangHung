<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bài 1</title>
    <style>
        body{
            background: lab(100% 0.01 -0.01);
            margin: 200px;
            
        }
        .container{
            border: 3px solid rgb(0, 0, 0);
            padding: 25px;
        }
        .form-row {
            display: flex;
            gap: 20px;
            margin-bottom: 15px;
        }
        .form-row input {
            flex: 1;
        }
        input, textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #b2b1b1;
            box-sizing: border-box;
            font-size: 14px;
        }
        textarea {
            height: 220px;
            resize: vertical;
        }
        .bottom-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        button{
            background-color: rgba(0, 200, 200, 0.486);
            padding: 10px 20px;
            border: none;
        }
    </style>
</head>
<body>
    <div class="container">
    <h3>Get in touch with us by filling contact form below</h3>

    <form>

        <div class="form-row">
            <input type="text" placeholder="* Enter your full name" required>
            <input type="email" placeholder="* Enter your email address" required>
        </div>

        <div class="form-row">
            <input type="text" placeholder="Enter your subject">
        </div>

        <div class="form-row">
            <textarea placeholder="* Your message here..." required></textarea>
        </div>

        <div class="bottom-row">
            <button>Send message</button>
            <div class="note">
                * Please fill all required form field, thanks!
            </div>
        </div>
    </form>
</div>
    
</body>
</html>
