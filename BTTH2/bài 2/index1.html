<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:wght@700&family=Oleo+Script:wght@700&family=Quicksand:wght@300;500&display=swap"
      rel="stylesheet"
    />
    <title>Travel Goals</title>

    <style>
      body {
        margin: 0;
        font-family: "Quicksand", sans-serif;
      }

      ul {
        list-style: none;
        padding: 0;
        margin: 0;
      }

      a {
        text-decoration: none;
      }
      header {
        display: flex;
        justify-content: space-between;
        padding: 15px 40px;
        position: absolute;
        width: 100%;
      }

      #page-logo a {
        font-family: "Oleo Script", cursive;
        color: gold;
        font-size: 26px;
      }

      nav ul {
        display: flex;
        gap: 25px;
      }

      nav a {
        color: white;
      }

      #hero {
        height: 500px;
        background: url("ảnh/ocean.jpg") center/cover no-repeat;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      #hero-content {
        background: rgba(0, 0, 0, 0.6);
        color: white;
        padding: 40px 60px;
        text-align: center;
        border-radius: 8px;
      }

      #hero-content a {
        background: yellow;
        color: black;
        padding: 10px 20px;
        display: inline-block;
        border-radius: 6px;
        font-weight: bold;
      }

      #highlights {
        background: #d8eef5;
        text-align: center;
        padding: 40px;
      }

      #destinations {
        display: flex;
        justify-content: center;
        gap: 30px;
        flex-wrap: wrap;
      }

      .destination {
        background: white;
        padding: 10px;
        width: 260px;
        border-radius: 8px;
      }

      .destination img {
        width: 100%;
        height: 160px;
        object-fit: cover;
        border-radius: 6px;
      }

      footer {
        background: #222;
        padding: 20px;
      }

      footer ul {
        display: flex;
        justify-content: center;
        gap: 40px;
      }

      footer img {
        width: 30px;
      }
    </style>
  </head>

  <body>
    <header>
      <div id="page-logo">
        <a href="/index.html">Travel Goals</a>
      </div>
      <nav>
        <ul>
          <li><a href="/places.html">Destinations</a></li>
          <li><a href="">About</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section id="hero">
        <div id="hero-content">
          <h1>Joe's Travel Page</h1>
          <p>Let's explore the world together!</p>
          <a href="/places.html">Discover places</a>
        </div>
      </section>

      <section id="highlights">
        <h2>Highlights</h2>
        <ul id="destinations">
          <li class="destination">
            <img src="ảnh/miami.jpg" alt="Miami streets on sunny day" />
            <p>Miami <strong>USA</strong></p>
          </li>
          <li class="destination">
            <img src="ảnh/munich.jpg" alt="Munich stadium in winter" />
            <p>Munich <strong>Germany</strong></p>
          </li>
          <li class="destination">
            <img src="ảnh/barcelona.jpg" alt="Palm beach in Barcelona" />
            <p>Barcelona <strong>Spain</strong></p>
          </li>
        </ul>
      </section>
    </main>

    <footer>
      <ul>
        <li>
          <a href="https://www.instagram.com">
            <img src="ảnh/insta.png" alt="Instagram logo" />
          </a>
        </li>
        <li>
          <a href="https://www.facebook.com">
            <img src="ảnh/facebook.png" alt="Facebook logo" />
          </a>
        </li>
      </ul>
    </footer>
  </body>
</html>
